document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        if (!entry.compressed && entry.mime.indexOf('image/') === 0) {
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' + entry.data;
          return;
        }
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

div style=\"background:#0C0F16;border-radius:8px;padding:9px 11px;\"><pre style=\"margin:0;font-family:'JetBrains Mono',monospace;font-size:10px;line-height:1.6;color:#C7CDD8;\">{\n  \"error\": <span style=\"color:#FB6F84;\">\"invalid_token\"<\u002Fspan>\n}<\u002Fpre><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <!-- skipped node -->\n          <div style=\"border:1px dashed #C7D0DB;border-radius:9px;padding:10px 12px;display:flex;align-items:center;gap:9px;opacity:0.7;\">\n            <span style=\"width:16px;height:16px;border-radius:50%;background:#C7D0DB;color:#fff;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;\">–<\u002Fspan>\n            <div style=\"min-width:0;flex:1;\"><div style=\"display:flex;align-items:center;gap:6px;\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:8.5px;font-weight:600;padding:1px 6px;border-radius:4px;background:#EEF1F5;color:#8A94A6;\">GET<\u002Fspan><span style=\"font-size:12px;font-weight:600;color:#8A94A6;\">전송 상태 확인<\u002Fspan><\u002Fdiv><\u002Fdiv>\n            <span style=\"font-size:10.5px;color:#98A2B3;font-weight:600;\">스킵<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ===================== SECTION 4 — A11Y ===================== -->\n    <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:18px;\">\n      <div style=\"width:24px;height:24px;border-radius:7px;background:#171B22;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;font-family:'Plus Jakarta Sans',sans-serif;\">4<\u002Fdiv>\n      <h2 style=\"margin:0;font-family:'Plus Jakarta Sans',sans-serif;font-size:22px;font-weight:700;color:#171B22;letter-spacing:-0.01em;\">접근성 — WCAG AA 점검<\u002Fh2>\n    <\u002Fdiv>\n\n    <div style=\"display:grid;grid-template-columns:1.25fr 1fr;gap:20px;margin-bottom:40px;\">\n      <!-- contrast table -->\n      <div style=\"background:#fff;border:1px solid #E6EAEF;border-radius:16px;padding:20px 22px;box-shadow:0 1px 2px rgba(16,24,40,0.04);\">\n        <div style=\"font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:14px;color:#171B22;margin-bottom:4px;\">명도 대비 (전경 / 배경)<\u002Fdiv>\n        <div style=\"font-size:11.5px;color:#8A94A6;margin-bottom:16px;\">기준: 일반 텍스트 4.5:1 · 큰 텍스트·UI 3:1<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:9px;\">\n          <!-- row -->\n          <div style=\"display:flex;align-items:center;gap:11px;\"><span style=\"font-size:13px;font-weight:600;color:#1A2231;background:#fff;border:1px solid #E6EAEF;border-radius:6px;padding:5px 10px;\">본문<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:10px;color:#8A94A6;flex:1;\">#1A2231 / #FFF<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#16A34A;font-weight:600;\">14.2<\u002Fspan><span style=\"font-size:10px;font-weight:700;color:#0E8A5F;background:#E3F7EE;border-radius:5px;padding:2px 7px;\">AAA<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:11px;\"><span style=\"font-size:13px;font-weight:600;color:#5C6675;background:#fff;border:1px solid #E6EAEF;border-radius:6px;padding:5px 10px;\">보조<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:10px;color:#8A94A6;flex:1;\">#5C6675 / #FFF<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#16A34A;font-weight:600;\">5.4<\u002Fspan><span style=\"font-size:10px;font-weight:700;color:#0E8A5F;background:#E3F7EE;border-radius:5px;padding:2px 7px;\">AA<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:11px;\"><span style=\"font-size:13px;font-weight:600;color:#8A94A6;background:#fff;border:1px solid #E6EAEF;border-radius:6px;padding:5px 10px;\">3차<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:10px;color:#8A94A6;flex:1;\">#8A94A6 / #FFF<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#B7791F;font-weight:600;\">3.0<\u002Fspan><span style=\"font-size:10px;font-weight:700;color:#B7791F;background:#FFF3DD;border-radius:5px;padding:2px 7px;\">큰 글씨만<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:11px;\"><span style=\"font-size:13px;font-weight:700;color:#fff;background:#0E9E74;border-radius:6px;padding:5px 10px;\">버튼<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:10px;color:#8A94A6;flex:1;\">#FFF / #0E9E74<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#B7791F;font-weight:600;\">3.0<\u002Fspan><span style=\"font-size:10px;font-weight:700;color:#B7791F;background:#FFF3DD;border-radius:5px;padding:2px 7px;\">주의<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:11px;\"><span style=\"font-size:13px;font-weight:700;color:#fff;background:#0A7D5A;border-radius:6px;padding:5px 10px;\">버튼*<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:10px;color:#8A94A6;flex:1;\">#FFF / #0A7D5A<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#16A34A;font-weight:600;\">4.6<\u002Fspan><span style=\"font-size:10px;font-weight:700;color:#0E8A5F;background:#E3F7EE;border-radius:5px;padding:2px 7px;\">AA<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:11px;\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:#0E8A5F;background:#E3F7EE;border-radius:6px;padding:5px 10px;\">POST<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:10px;color:#8A94A6;flex:1;\">#0E8A5F / #E3F7EE<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#16A34A;font-weight:600;\">4.7<\u002Fspan><span style=\"font-size:10px;font-weight:700;color:#0E8A5F;background:#E3F7EE;border-radius:5px;padding:2px 7px;\">AA<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:11px;\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:#EAEDF3;background:#151A23;border-radius:6px;padding:5px 10px;\">다크 보조<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:10px;color:#8A94A6;flex:1;\">#8A94A6 / #151A23<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#16A34A;font-weight:600;\">4.6<\u002Fspan><span style=\"font-size:10px;font-weight:700;color:#0E8A5F;background:#E3F7EE;border-radius:5px;padding:2px 7px;\">AA<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:14px;padding:10px 12px;background:#FFF9F0;border:1px solid #F4E4C8;border-radius:9px;font-size:11.5px;line-height:1.55;color:#8A5A12;\"><strong>*핵심 수정:<\u002Fstrong> 흰 글씨 Primary 버튼은 <code style=\"font-family:'JetBrains Mono',monospace;\">#0E9E74<\u002Fcode>(3.0)가 일반 텍스트 AA 미달 → 버튼 <em>채움<\u002Fem>만 <code style=\"font-family:'JetBrains Mono',monospace;\">#0A7D5A<\u002Fcode>로 어둡게(4.6). <code style=\"font-family:'JetBrains Mono',monospace;\">#0E9E74<\u002Fcode>는 테두리·아이콘·큰 텍스트용으로 유지.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- checklist -->\n      <div style=\"background:#fff;border:1px solid #E6EAEF;border-radius:16px;padding:20px 22px;box-shadow:0 1px 2px rgba(16,24,40,0.04);\">\n        <div style=\"font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:14px;color:#171B22;margin-bottom:16px;\">체크 포인트<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:13px;\">\n          <div style=\"display:flex;gap:10px;\"><span style=\"width:18px;height:18px;border-radius:50%;background:#E3F7EE;color:#0E8A5F;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;margin-top:1px;\">✓<\u002Fspan><div><div style=\"font-size:12.5px;font-weight:600;color:#1A2231;margin-bottom:2px;\">색에만 의존하지 않기<\u002Fdiv><div style=\"font-size:11.5px;line-height:1.5;color:#5C6675;\">노드 상태 = 색 + 아이콘(✓ ! –) + 상태코드(200/401/스킵). 색맹 사용자도 구분 가능.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex;gap:10px;\"><span style=\"width:18px;height:18px;border-radius:50%;background:#E3F7EE;color:#0E8A5F;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;margin-top:1px;\">✓<\u002Fspan><div><div style=\"font-size:12.5px;font-weight:600;color:#1A2231;margin-bottom:2px;\">포커스 링 상시 노출<\u002Fdiv><div style=\"font-size:11.5px;line-height:1.5;color:#5C6675;\">모든 입력·버튼·노드에 3px 링(<code style=\"font-family:'JetBrains Mono',monospace;\">--focus<\u002Fcode>). 키보드 탭 이동 추적 가능.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex;gap:10px;\"><span style=\"width:18px;height:18px;border-radius:50%;background:#E3F7EE;color:#0E8A5F;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;margin-top:1px;\">✓<\u002Fspan><div><div style=\"font-size:12.5px;font-weight:600;color:#1A2231;margin-bottom:2px;\">선택 = 테두리+링 (색 X 단독)<\u002Fdiv><div style=\"font-size:11.5px;line-height:1.5;color:#5C6675;\">선택 노드는 1.5px 브랜드 테두리 + 외곽 링으로 표시. 명도차로도 인지.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex;gap:10px;\"><span style=\"width:18px;height:18px;border-radius:50%;background:#FFF3DD;color:#B7791F;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;margin-top:1px;\">!<\u002Fspan><div><div style=\"font-size:12.5px;font-weight:600;color:#1A2231;margin-bottom:2px;\">타깃 크기 ≥ 32px<\u002Fdiv><div style=\"font-size:11.5px;line-height:1.5;color:#5C6675;\">주요 버튼 32–40px 확보. <code style=\"font-family:'JetBrains Mono',monospace;\">sm 28px<\u002Fcode>는 데스크톱 보조 액션에만.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex;gap:10px;\"><span style=\"width:18px;height:18px;border-radius:50%;background:#E3F7EE;color:#0E8A5F;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;margin-top:1px;\">✓<\u002Fspan><div><div style=\"font-size:12.5px;font-weight:600;color:#1A2231;margin-bottom:2px;\">메서드 배지 텍스트 대비<\u002Fdiv><div style=\"font-size:11.5px;line-height:1.5;color:#5C6675;\">GET/POST/DELETE 배지 모두 4.5:1↑. PUT(<code style=\"font-family:'JetBrains Mono',monospace;\">#B7791F<\u002Fcode>)은 3.4 → 작은 배지엔 <code style=\"font-family:'JetBrains Mono',monospace;\">#8A5A12<\u002Fcode> 권장.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ===================== SECTION 5 — CONTROL FLOW NODES ===================== -->\n    <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:8px;\">\n      <div style=\"width:24px;height:24px;border-radius:7px;background:#171B22;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;font-family:'Plus Jakarta Sans',sans-serif;\">5<\u002Fdiv>\n      <h2 style=\"margin:0;font-family:'Plus Jakarta Sans',sans-serif;font-size:22px;font-weight:700;color:#171B22;letter-spacing:-0.01em;\">제어 흐름 노드 <span style=\"color:#7C5CFF;\">(n8n 스타일)<\u002Fspan><\u002Fh2>\n    <\u002Fdiv>\n    <p style=\"margin:0 0 18px;max-width:780px;font-size:13.5px;line-height:1.6;color:#5C6675;\">API 노드(데이터)와 구분되는 <strong style=\"color:#171B22;\">로직 노드<\u002Fstrong> 패밀리. HTTP 메서드 배지 대신 <strong>색 아이콘 타일 + 타입 칩<\u002Fstrong>으로 식별하고, <strong>다중 출력 포트(분기)<\u002Fstrong>를 라벨과 함께 노출합니다.<\u002Fp>\n\n    <!-- execution-model note -->\n    <div style=\"background:#FFF9F0;border:1px solid #F4E4C8;border-radius:12px;padding:13px 16px;margin-bottom:22px;display:flex;gap:11px;align-items:flex-start;\">\n      <span style=\"font-size:15px;line-height:1.3;\">⚠️<\u002Fspan>\n      <div style=\"font-size:12.5px;line-height:1.6;color:#8A5A12;\"><strong>실행 모델 영향:<\u002Fstrong> 분기(IF/Switch)·반복(Loop/Batch)·병합(Merge)이 들어가면 워크플로우가 더 이상 단순 \"순차\"가 아니라 <strong>그래프(DAG + 루프)<\u002Fstrong>가 됩니다. 엔진은 토폴로지 순서로 노드를 평가하고, 선택되지 않은 분기는 <em>스킵<\u002Fem> 처리합니다. UI는 이 흐름을 엣지 색(활성/스킵)으로 그대로 보여줍니다.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- logic color tokens -->\n    <div style=\"display:flex;flex-wrap:wrap;gap:10px;margin-bottom:22px;\">\n      <div style=\"display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #E6EAEF;border-radius:9px;padding:7px 12px;\"><span style=\"width:18px;height:18px;border-radius:5px;background:#7C5CFF;\"><\u002Fspan><span style=\"font-size:12px;color:#1A2231;font-weight:600;\">분기<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:10px;color:#8A94A6;\">#7C5CFF<\u002Fspan><span style=\"font-size:11px;color:#98A1AE;\">IF · Switch · Filter<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #E6EAEF;border-radius:9px;padding:7px 12px;\"><span style=\"width:18px;height:18px;border-radius:5px;background:#E8883B;\"><\u002Fspan><span style=\"font-size:12px;color:#1A2231;font-weight:600;\">반복<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:10px;color:#8A94A6;\">#E8883B<\u002Fspan><span style=\"font-size:11px;color:#98A1AE;\">Loop · Batch<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #E6EAEF;border-radius:9px;padding:7px 12px;\"><span style=\"width:18px;height:18px;border-radius:5px;background:#3B82F6;\"><\u002Fspan><span style=\"font-size:12px;color:#1A2231;font-weight:600;\">병합<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:10px;color:#8A94A6;\">#3B82F6<\u002Fspan><span style=\"font-size:11px;color:#98A1AE;\">Merge · Wait<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- NODE GALLERY -->\n    <div style=\"background:#fff;border:1px solid #E6EAEF;border-radius:16px;padding:20px 22px 24px;box-shadow:0 1px 2px rgba(16,24,40,0.04);margin-bottom:20px;\">\n      <div style=\"font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:14px;color:#171B22;margin-bottom:4px;\">로직 노드 카드<\u002Fdiv>\n      <div style=\"font-size:11.5px;color:#8A94A6;margin-bottom:18px;\">우측 점 = 출력 포트. 분기 노드는 출력이 2개 이상이며 각 포트에 라벨이 붙습니다.<\u002Fdiv>\n      <div style=\"display:flex;flex-wrap:wrap;gap:18px;\">\n\n        <!-- IF -->\n        <div style=\"width:210px;background:#fff;border:1px solid #E6EAEF;border-radius:11px;overflow:hidden;box-shadow:0 2px 8px rgba(16,24,40,0.06);position:relative;\">\n          <div style=\"height:4px;background:#7C5CFF;\"><\u002Fdiv>\n          <div style=\"padding:11px 13px;\">\n            <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:9px;\"><span style=\"width:24px;height:24px;border-radius:7px;background:#7C5CFF;display:flex;align-items:center;justify-content:center;flex-shrink:0;\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"6\" y1=\"3\" x2=\"6\" y2=\"15\"><\u002Fline><circle cx=\"18\" cy=\"6\" r=\"3\"><\u002Fcircle><circle cx=\"6\" cy=\"18\" r=\"3\"><\u002Fcircle><path d=\"M18 9a9 9 0 0 1-9 9\"><\u002Fpath><\u002Fsvg><\u002Fspan><span style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:700;color:#1A2231;\">IF<\u002Fspan><span style=\"font-size:10px;font-weight:600;color:#6D45D6;background:#F0EBFF;border-radius:5px;padding:2px 7px;margin-left:auto;\">조건분기<\u002Fspan><\u002Fdiv>\n            <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#5C6675;background:#F7F9FB;border:1px solid #EEF1F5;border-radius:6px;padding:6px 8px;\">status == \"active\"<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"border-top:1px solid #EEF1F5;padding:8px 13px;display:flex;flex-direction:column;gap:7px;\">\n            <div style=\"display:flex;align-items:center;gap:7px;\"><span style=\"width:8px;height:8px;border-radius:50%;background:#16A34A;\"><\u002Fspan><span style=\"font-size:11px;color:#1A2231;font-weight:600;\">참 (true)<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:7px;\"><span style=\"width:8px;height:8px;border-radius:50%;background:#98A2B3;\"><\u002Fspan><span style=\"font-size:11px;color:#5C6675;\">거짓 (false)<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"position:absolute;left:-5px;top:46px;width:9px;height:9px;border-radius:50%;background:#fff;border:2px solid #7C5CFF;\"><\u002Fdiv>\n          <div style=\"position:absolute;right:-5px;bottom:30px;width:9px;height:9px;border-radius:50%;background:#fff;border:2px solid #16A34A;\"><\u002Fdiv>\n          <div style=\"position:absolute;right:-5px;bottom:8px;width:9px;height:9px;border-radius:50%;background:#fff;border:2px solid #98A2B3;\"><\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- SWITCH -->\n        <div style=\"width:210px;background:#fff;border:1px solid #E6EAEF;border-radius:11px;overflow:hidden;box-shadow:0 2px 8px rgba(16,24,40,0.06);position:relative;\">\n          <div style=\"height:4px;background:#7C5CFF;\"><\u002Fdiv>\n          <div style=\"padding:11px 13px;\">\n            <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:9px;\"><span style=\"width:24px;height:24px;border-radius:7px;background:#7C5CFF;display:flex;align-items:center;justify-content:center;flex-shrink:0;\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"3\" y1=\"12\" x2=\"9\" y2=\"12\"><\u002Fline><path d=\"M9 12l5-6h7\"><\u002Fpath><path d=\"M9 12l5 6h7\"><\u002Fpath><path d=\"M18 3l3 3-3 3\"><\u002Fpath><path d=\"M18 15l3 3-3 3\"><\u002Fpath><\u002Fsvg><\u002Fspan><span style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:700;color:#1A2231;\">Switch<\u002Fspan><span style=\"font-size:10px;font-weight:600;color:#6D45D6;background:#F0EBFF;border-radius:5px;padding:2px 7px;margin-left:auto;\">다중분기<\u002Fspan><\u002Fdiv>\n            <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#5C6675;background:#F7F9FB;border:1px solid #EEF1F5;border-radius:6px;padding:6px 8px;\">switch(type)<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"border-top:1px solid #EEF1F5;padding:8px 13px;display:flex;flex-direction:column;gap:6px;\">\n            <div style=\"display:flex;align-items:center;gap:7px;\"><span style=\"width:8px;height:8px;border-radius:50%;background:#7C5CFF;\"><\u002Fspan><span style=\"font-size:11px;color:#1A2231;\">case \"text\"<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:7px;\"><span style=\"width:8px;height:8px;border-radius:50%;background:#7C5CFF;\"><\u002Fspan><span style=\"font-size:11px;color:#1A2231;\">case \"voice\"<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:7px;\"><span style=\"width:8px;height:8px;border-radius:50%;background:#98A2B3;\"><\u002Fspan><span style=\"font-size:11px;color:#5C6675;\">기본 (default)<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"position:absolute;left:-5px;top:46px;width:9px;height:9px;border-radius:50%;background:#fff;border:2px solid #7C5CFF;\"><\u002Fdiv>\n          <div style=\"position:absolute;right:-5px;bottom:52px;width:9px;height:9px;border-radius:50%;background:#fff;border:2px solid #7C5CFF;\"><\u002Fdiv>\n          <div style=\"position:absolute;right:-5px;bottom:30px;width:9px;height:9px;border-radius:50%;background:#fff;border:2px solid #7C5CFF;\"><\u002Fdiv>\n          <div style=\"position:absolute;right:-5px;bottom:8px;width:9px;height:9px;border-radius:50%;background:#fff;border:2px solid #98A2B3;\"><\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- LOOP -->\n        <div style=\"width:210px;background:#fff;border:1px solid #E6EAEF;border-radius:11px;overflow:hidden;box-shadow:0 2px 8px rgba(16,24,40,0.06);position:relative;\">\n          <div style=\"height:4px;background:#E8883B;\"><\u002Fdiv>\n          <div style=\"padding:11px 13px;\">\n            <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:9px;\"><span style=\"width:24px;height:24px;border-radius:7px;background:#E8883B;display:flex;align-items:center;justify-content:center;flex-shrink:0;\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M17 2l4 4-4 4\"><\u002Fpath><path d=\"M3 11v-1a4 4 0 0 1 4-4h14\"><\u002Fpath><path d=\"M7 22l-4-4 4-4\"><\u002Fpath><path d=\"M21 13v1a4 4 0 0 1-4 4H3\"><\u002Fpath><\u002Fsvg><\u002Fspan><span style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:700;color:#1A2231;\">Loop<\u002Fspan><span style=\"font-size:10px;font-weight:600;color:#B7791F;background:#FDF0E3;border-radius:5px;padding:2px 7px;margin-left:auto;\">반복<\u002Fspan><\u002Fdiv>\n            <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#5C6675;background:#F7F9FB;border:1px solid #EEF1F5;border-radius:6px;padding:6px 8px;\">items 전체 반복<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"border-top:1px solid #EEF1F5;padding:8px 13px;display:flex;flex-direction:column;gap:7px;\">\n            <div style=\"display:flex;align-items:center;gap:7px;\"><span style=\"width:8px;height:8px;border-radius:50%;background:#E8883B;\"><\u002Fspan><span style=\"font-size:11px;color:#1A2231;font-weight:600;\">루프 (각 항목)<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:7px;\"><span style=\"width:8px;height:8px;border-radius:50%;background:#16A34A;\"><\u002Fspan><span style=\"font-size:11px;color:#5C6675;\">완료 (done)<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"position:absolute;left:-5px;top:46px;width:9px;height:9px;border-radius:50%;background:#fff;border:2px solid #E8883B;\"><\u002Fdiv>\n          <div style=\"position:absolute;right:-5px;bottom:30px;width:9px;height:9px;border-radius:50%;background:#fff;border:2px solid #E8883B;\"><\u002Fdiv>\n          <div style=\"position:absolute;right:-5px;bottom:8px;width:9px;height:9px;border-radius:50%;background:#fff;border:2px solid #16A34A;\"><\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- BATCH -->\n        <div style=\"width:210px;background:#fff;border:1px solid #E6EAEF;border-radius:11px;overflow:hidden;box-shadow:0 2px 8px rgba(16,24,40,0.06);position:relative;\">\n          <div style=\"height:4px;background:#E8883B;\"><\u002Fdiv>\n          <div style=\"padding:11px 13px;\">\n            <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:9px;\"><span style=\"width:24px;height:24px;border-radius:7px;background:#E8883B;display:flex;align-items:center;justify-content:center;flex-shrink:0;\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"3\" width=\"8\" height=\"8\" rx=\"1\"><\u002Frect><rect x=\"13\" y=\"3\" width=\"8\" height=\"8\" rx=\"1\"><\u002Frect><rect x=\"3\" y=\"13\" width=\"8\" height=\"8\" rx=\"1\"><\u002Frect><rect x=\"13\" y=\"13\" width=\"8\" height=\"8\" rx=\"1\"><\u002Frect><\u002Fsvg><\u002Fspan><span style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:700;color:#1A2231;\">Batch<\u002Fspan><span style=\"font-size:10px;font-weight:600;color:#B7791F;background:#FDF0E3;border-radius:5px;padding:2px 7px;margin-left:auto;\">배치분할<\u002Fspan><\u002Fdiv>\n            <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#5C6675;background:#F7F9FB;border:1px solid #EEF1F5;border-radius:6px;padding:6px 8px;\">배치 크기 = 10<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"border-top:1px solid #EEF1F5;padding:8px 13px;display:flex;flex-direction:column;gap:7px;\">\n            <div style=\"display:flex;align-items:center;gap:7px;\"><span style=\"width:8px;height:8px;border-radius:50%;background:#E8883B;\"><\u002Fspan><span style=\"font-size:11px;color:#1A2
