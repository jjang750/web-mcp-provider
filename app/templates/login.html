<!doctype html>
<html lang="ko" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>로그인 — MCP Provider</title>
<script>(function(){try{var t=localStorage.getItem('mcp-theme');if(t)document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/tokens.css">
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;min-height:100%;}
  body{font-family:var(--font-ui,'Plus Jakarta Sans',sans-serif);background:var(--canvas,#f4f5f7);color:var(--text-1,#1a1c1e);
       display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
  .card{width:100%;max-width:380px;background:var(--surface,#fff);border:1px solid var(--border,#e3e5e8);
        border-radius:16px;padding:32px;box-shadow:0 8px 30px rgba(0,0,0,.08);}
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:24px;}
  .brand .logo{width:34px;height:34px;border-radius:9px;background:var(--brand,#5b5bd6);
        display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:16px;}
  .brand .name{font-weight:700;font-size:16px;}
  h1{font-size:18px;margin:0 0 4px;}
  p.sub{margin:0 0 22px;color:var(--text-2,#6b7280);font-size:13px;}
  label{display:block;font-size:12px;font-weight:600;margin:0 0 6px;color:var(--text-2,#6b7280);}
  .field{margin-bottom:16px;}
  input{width:100%;height:44px;padding:0 14px;border:1px solid var(--border,#d5d8dc);border-radius:10px;
        background:var(--canvas,#fff);color:var(--text-1,#1a1c1e);font-size:14px;font-family:inherit;}
  input:focus{outline:none;border-color:var(--brand,#5b5bd6);box-shadow:0 0 0 3px rgba(91,91,214,.15);}
  button{width:100%;height:46px;border:none;border-radius:10px;background:var(--brand,#5b5bd6);color:#fff;
        font-weight:700;font-size:14px;font-family:inherit;cursor:pointer;transition:opacity .15s;}
  button:hover{opacity:.92;}
  .err{background:#fdecec;color:#b42318;border:1px solid #f5c2c0;border-radius:8px;padding:10px 12px;
        font-size:13px;margin-bottom:16px;}
</style>
</head>
<body>
  <div class="card">
    <div class="brand"><div class="logo">M</div><div class="name">MCP Provider</div></div>
    <h1>로그인</h1>
    <p class="sub">관리 콘솔에 접속하려면 로그인하세요.</p>
    {% if error %}<div class="err">{{ error }}</div>{% endif %}
    <form method="post" action="/login{% if next %}?next={{ next }}{% endif %}" autocomplete="off">
      <div class="field">
        <label for="username">아이디</label>
        <input id="username" name="username" type="text" required autofocus>
      </div>
      <div class="field">
        <label for="password">비밀번호</label>
        <input id="password" name="password" type="password" required>
      </div>
      <button type="submit">로그인</button>
    </form>
  </div>
</body>
</html>
