<!doctype html>
<html lang="ko" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MCP Provider — 워크플로우</title>
<script>(function(){try{var t=localStorage.getItem('mcp-theme');if(t)document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/tokens.css">
<style>
*{box-sizing:border-box;}
html,body{margin:0;min-height:100%;}
body{font-family:var(--font-ui);background:var(--canvas);color:var(--text-1);}
button{font-family:var(--font-ui);cursor:pointer;}

/* top bar */
.topbar{height:58px;display:flex;align-items:center;gap:12px;padding:0 24px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;}
.brand{display:flex;align-items:center;gap:9px;}
.brand .logo{width:28px;height:28px;border-radius:8px;background:var(--brand);display:flex;align-items:center;justify-content:center;}
.brand .logo .sq{width:11px;height:11px;border:2px solid #fff;border-radius:3px;}
.brand .name{font-size:15px;font-weight:800;letter-spacing:-0.01em;color:var(--text-1);}
.brand .tag{font-size:11px;font-weight:600;color:var(--text-3);background:var(--surface-3);border-radius:var(--r-pill);padding:2px 9px;}
.theme-btn{height:32px;display:flex;align-items:center;gap:6px;border-radius:var(--r-md);border:1px solid var(--border);background:var(--surface);padding:0 11px;font-size:12px;font-weight:600;color:var(--text-2);}
.theme-btn:hover{background:var(--surface-3);}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#0E9E74,#3B82F6);display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;}

/* layout */
.wrap{max-width:1100px;margin:0 auto;padding:32px 24px 64px;}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:24px;}
.page-head h1{margin:0 0 5px;font-size:26px;font-weight:800;letter-spacing:-0.02em;color:var(--text-1);}
.page-head p{margin:0;font-size:13.5px;color:var(--text-2);}
.btn{height:38px;border-radius:var(--r-md);padding:0 16px;font-size:13.5px;font-weight:600;display:inline-flex;align-items:center;gap:7px;border:1px solid transparent;}
.btn-primary{background:var(--brand-fill);color:#fff;box-shadow:var(--sh-1);}
.btn-primary:hover{filter:brightness(1.08);}
.btn-secondary{background:var(--surface);border-color:var(--border-strong);color:var(--text-1);}
.btn-secondary:hover{background:var(--surface-3);}
.btn-ghost{background:var(--surface-3);color:var(--text-2);}

/* spec upload */
.upload{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:30px;}
.drop{background:var(--surface);border:1.5px dashed var(--border-strong);border-radius:var(--r-lg);padding:22px;display:flex;align-items:center;gap:15px;transition:border-color .15s,background .15s;}
.drop.drag{border-color:var(--brand);background:var(--brand-weak);}
.drop .ico{width:42px;height:42px;border-radius:11px;background:var(--brand-weak);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--brand-text);}
.drop .t1{font-size:13.5px;font-weight:700;color:var(--text-1);margin-bottom:2px;}
.drop .t2{font-size:12px;color:var(--text-3);}
.url-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px 20px;}
.url-box .lbl{font-size:12px;font-weight:700;color:var(--text-1);margin-bottom:9px;display:flex;align-items:center;gap:7px;}
.url-row{display:flex;gap:8px;}
.url-row input{flex:1;font-family:var(--font-mono);font-size:12px;color:var(--text-1);background:var(--surface);border:1px solid var(--border-strong);border-radius:var(--r-md);padding:0 11px;height:38px;outline:none;}
.url-row input:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--focus);}

/* list toolbar */
.list-bar{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.list-bar .count{font-size:13px;font-weight:700;color:var(--text-1);}
.search{display:flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:0 11px;height:34px;margin-left:auto;width:240px;}
.search input{border:none;outline:none;background:none;font-size:12.5px;color:var(--text-1);width:100%;font-family:var(--font-ui);}
.search input::placeholder{color:var(--text-3);}

/* workflow cards */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px;box-shadow:var(--sh-1);cursor:pointer;transition:box-shadow .15s,border-color .15s,transform .1s;position:relative;overflow:hidden;}
.card:hover{box-shadow:var(--sh-2);border-color:var(--border-strong);}
.card:active{transform:translateY(1px);}
.card .stripe{position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--brand);}
.card .ch{display:flex;align-items:flex-start;gap:10px;margin-bottom:14px;}
.card .ctitle{font-size:15px;font-weight:700;color:var(--text-1);letter-spacing:-0.01em;line-height:1.3;}
.card .cgroup{font-size:11.5px;color:var(--text-3);font-family:var(--font-mono);margin-top:3px;}
.expose{font-size:10.5px;font-weight:700;border-radius:var(--r-pill);padding:3px 9px;display:flex;align-items:center;gap:5px;flex-shrink:0;}
.expose.on{color:var(--brand-text);background:var(--brand-weak);}
.expose.off{color:var(--text-3);background:var(--surface-3);}
.expose .d{width:5px;height:5px;border-radius:50%;background:currentColor;}
.card .cmeta{display:flex;align-items:center;gap:14px;font-size:11.5px;color:var(--text-2);}
.card .cmeta .m{display:flex;align-items:center;gap:5px;}
.card .cfoot{display:flex;align-items:center;margin-top:14px;padding-top:13px;border-top:1px solid var(--surface-3);gap:8px;}
.mini-badges{display:flex;gap:4px;}
.mini{font-family:var(--font-mono);font-size:9px;font-weight:600;padding:1.5px 6px;border-radius:5px;}
.mini.get{color:var(--m-get);background:var(--m-get-bg);}
.mini.post{color:var(--m-post);background:var(--m-post-bg);}
.mini.put{color:var(--m-put);background:var(--m-put-bg);}
.mini.delete{color:var(--m-delete);background:var(--m-delete-bg);}
.card .actions{margin-left:auto;display:flex;gap:4px;opacity:0;transition:opacity .15s;}
.card:hover .actions{opacity:1;}
.iconbtn{width:30px;height:30px;border-radius:var(--r-md);border:1px solid var(--border);background:var(--surface);color:var(--text-2);font-size:14px;display:flex;align-items:center;justify-content:center;}
.iconbtn:hover{background:var(--surface-3);color:var(--text-1);}
.iconbtn.danger:hover{background:var(--danger-weak);color:var(--danger);border-color:#F3C9C9;}

/* new card */
.card-new{border:1.5px dashed var(--border-strong);background:var(--surface-2);box-shadow:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;min-height:150px;color:var(--text-2);}
.card-new:hover{border-color:var(--brand);color:var(--brand-text);background:var(--brand-weak);}
.card-new .plus{width:38px;height:38px;border-radius:50%;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:20px;}
.card-new:hover .plus{border-color:var(--brand);color:var(--brand-text);}

/* empty state */
.empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text-3);}

/* toast */
.toast-wrap{position:fixed;right:18px;bottom:18px;display:flex;flex-direction:column;gap:9px;z-index:100;}
.toast{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--success);border-radius:var(--r-lg);padding:10px 13px;box-shadow:var(--sh-2);font-size:12.5px;color:var(--text-1);font-weight:500;animation:slidein .2s ease;}
.toast.fail{border-left-color:var(--danger);}
.toast .ticon{width:18px;height:18px;border-radius:50%;color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--success);}
.toast.fail .ticon{background:var(--danger);}
@keyframes slidein{from{transform:translateX(20px);opacity:0;}}

/* dialog */
.overlay{position:fixed;inset:0;background:rgba(16,24,40,.45);display:none;align-items:center;justify-content:center;z-index:50;}
.overlay.show{display:flex;}
.dialog{width:440px;background:var(--surface);border-radius:var(--r-xl);box-shadow:var(--sh-3);overflow:hidden;}
.dlg-head{padding:18px 20px 16px;border-bottom:1px solid var(--border);}
.dlg-head h2{margin:0;font-size:16px;font-weight:700;color:var(--text-1);}
.dlg-body{padding:18px 20px;}
.dlg-body label{display:block;font-size:11.5px;font-weight:600;color:var(--text-2);margin-bottom:6px;}
.dlg-body input{width:100%;font-size:13px;color:var(--text-1);background:var(--surface);border:1px solid var(--border-strong);border-radius:var(--r-md);padding:9px 11px;outline:none;font-family:var(--font-ui);}
.dlg-body input:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--focus);}
.dlg-foot{padding:16px 20px 20px;display:flex;gap:10px;justify-content:flex-end;border-top:1px solid var(--border);}
.confirm-text{font-size:13px;color:var(--text-2);line-height:1.6;}
.confirm-text b{color:var(--text-1);}
</style></head><body>
<div class="topbar">
  <div class="brand">
    <div class="logo"><div class="sq"></div></div>
    <span class="name">MCP Provider</span>
    <span class="tag">워크플로우</span>
  </div>
  <div style="display:flex;align-items:center;gap:10px;margin-left:auto;">
    <button class="theme-btn" id="themeBtn"><span id="themeIcon">🌗</span><span id="themeLabel">라이트</span></button>
    <div class="avatar">A</div>
  </div>
</div>
<div class="wrap">
  <div class="page-head">
    <div>
      <h1>워크플로우</h1>
      <p>API 스펙을 올리고 노드를 연결해 워크플로우를 만드세요. 완성하면 MCP 도구로 노출됩니다.</p>
    </div>
    <button class="btn btn-primary" onclick="openCreate()"><span style="font-size:16px;line-height:1;">+</span>새 워크플로우</button>
  </div>
  <div class="upload">
    <div class="drop" id="dropZone">
      <div class="ico"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><path d="M17 8l-5-5-5 5"></path><path d="M12 3v12"></path></svg></div>
      <div style="flex:1;">
        <div class="t1">OpenAPI / Swagger 스펙 업로드</div>
        <div class="t2">YAML·JSON 파일을 끌어다 놓거나 클릭해서 선택</div>
      </div>
      <button class="btn btn-secondary" onclick="pickFile()">파일 선택</button>
      <input type="file" id="fileInput" hidden accept=".json,.yaml,.yml">
    </div>
    <div class="url-box">
      <div class="lbl"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>스펙 URL로 가져오기</div>
      <div class="url-row">
        <input id="urlInput" placeholder="http://localhost:8000/openapi.json">
        <button class="btn btn-secondary" onclick="fromUrl()">가져오기</button>
      </div>
    </div>
  </div>
  <div class="list-bar">
    <span class="count" id="count">워크플로우 0개</span>
    <div class="search"><span style="color:var(--text-3);">⌕</span><input id="searchInput" placeholder="이름·그룹 검색" oninput="render()"></div>
  </div>
  <div class="grid" id="grid"></div>
</div>
<div class="toast-wrap" id="toastWrap"></div>
<div class="overlay" id="createOverlay"><div class="dialog">
  <div class="dlg-head"><h2>새 워크플로우</h2></div>
  <div class="dlg-body">
    <label>이름</label>
    <input id="newName" placeholder="예: 고객 알림 워크플로우" onkeydown="if(event.key==='Enter')doCreate()">
    <label style="margin-top:13px;">설명 <span style="color:var(--text-3);font-weight:400;">(선택 · MCP 도구 설명으로 사용)</span></label>
    <textarea id="newDesc" rows="3" placeholder="이 워크플로우가 하는 일을 한두 문장으로 적어두면, Claude가 도구를 더 정확히 선택합니다." style="width:100%;font-size:13px;color:var(--text-1);background:var(--surface);border:1px solid var(--border-strong);border-radius:var(--r-md);padding:9px 11px;outline:none;font-family:var(--font-ui);resize:vertical;line-height:1.5;"></textarea>
  </div>
  <div class="dlg-foot"><button class="btn btn-ghost" onclick="closeCreate()">취소</button><button class="btn btn-primary" onclick="doCreate()">만들기</button></div>
</div></div>
<div class="overlay" id="delOverlay"><div class="dialog">
  <div class="dlg-head"><h2>워크플로우 삭제</h2></div>
  <div class="dlg-body"><p class="confirm-text"><b id="delName"></b>을(를) 삭제할까요?<br>이 작업은 되돌릴 수 없습니다.</p></div>
  <div class="dlg-foot"><button class="btn btn-ghost" onclick="closeDel()">취소</button><button class="btn btn-primary" style="background:var(--danger);" onclick="doDelete()">삭제</button></div>
</div></div>
<script>
{% raw %}
const $=id=>document.getElementById(id);
const esch=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function rel(iso){if(!iso)return'';const d=new Date(iso);if(isNaN(d))return'';const s=(Date.now()-d.getTime())/1000;if(s<60)return'방금 전';if(s<3600)return Math.floor(s/60)+'분 전';if(s<86400)return Math.floor(s/3600)+'시간 전';if(s<604800)return Math.floor(s/86400)+'일 전';return d.toLocaleDateString('ko-KR');}
function toast(msg,kind){const w=$('toastWrap');const t=document.createElement('div');t.className='toast'+(kind==='fail'?' fail':'');t.innerHTML='<span class="ticon">'+(kind==='fail'?'!':'✓')+'</span>'+esch(msg);w.appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300);},2600);}
let WORKFLOWS=[],delTarget=null;
async function load(){try{WORKFLOWS=await fetch('/api/workflows').then(r=>r.json());}catch(e){WORKFLOWS=[];toast('목록 로드 실패','fail');}render();}
function render(){
  const q=(($('searchInput').value)||'').toLowerCase();
  const list=WORKFLOWS.filter(w=>((w.name||'')+' '+(w.mcp_group||'')).toLowerCase().includes(q));
  $('count').textContent='워크플로우 '+WORKFLOWS.length+'개';
  const grid=$('grid');grid.innerHTML='';
  list.forEach(w=>{
    const expose=!!w.mcp_exposed,group=w.mcp_group||'default',methods=w.methods||[],nodes=w.node_count||0;
    const card=document.createElement('div');card.className='card';
    card.onclick=e=>{if(e.target.closest('.actions'))return;location.href='/editor/'+w.id;};
    card.innerHTML=
      '<div class="stripe" style="'+(expose?'':'background:var(--border-strong);')+'"></div>'+
      '<div class="ch"><div style="flex:1;min-width:0;"><div class="ctitle">'+esch(w.name)+'</div>'+
      '<div class="cgroup">MCP 그룹 · '+esch(group)+'</div></div>'+
      '<span class="expose '+(expose?'on':'off')+'"><span class="d"></span>'+(expose?'노출 ON':'비공개')+'</span></div>'+
      '<div class="cfoot"><div class="mini-badges">'+methods.map(m=>'<span class="mini '+m+'">'+m.toUpperCase()+'</span>').join('')+'</div>'+
      '<div class="cmeta" style="margin-left:8px;"><span class="m">노드 '+nodes+'</span><span class="m" style="color:var(--text-3);">· '+rel(w.updated_at)+'</span></div>'+
      '<div class="actions"><button class="iconbtn" title="복제" onclick="dup('+w.id+')">&#10689;</button>'+
      '<button class="iconbtn danger" title="삭제" onclick="askDelete('+w.id+')">&#128465;</button></div></div>';
    grid.appendChild(card);
  });
  const nc=document.createElement('div');nc.className='card card-new';nc.onclick=openCreate;
  nc.innerHTML='<div class="plus">+</div><div style="font-size:13px;font-weight:600;">새 워크플로우</div>';
  grid.appendChild(nc);
  if(list.length===0){const e=document.createElement('div');e.className='empty';e.textContent=WORKFLOWS.length?'검색 결과가 없습니다.':'아직 워크플로우가 없습니다. 새로 만들어 보세요.';grid.insertBefore(e,nc);}
}
function openCreate(){$('createOverlay').classList.add('show');setTimeout(()=>$('newName').focus(),50);}
function closeCreate(){$('createOverlay').classList.remove('show');$('newName').value='';const d=$('newDesc');if(d)d.value='';}
async function doCreate(){
  const name=$('newName').value.trim()||'제목 없는 워크플로우';
  const description=($('newDesc')&&$('newDesc').value.trim())||null;
  try{const w=await fetch('/api/workflows',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,description})}).then(r=>r.json());
    closeCreate();toast('"'+name+'" 생성됨 — 에디터로 이동');setTimeout(()=>location.href='/editor/'+w.id,600);
  }catch(e){toast('생성 실패','fail');}
}
async function dup(id){
  const w=WORKFLOWS.find(x=>x.id===id);if(!w)return;
  try{const detail=await fetch('/api/workflows/'+id).then(r=>r.json());
    const nw=await fetch('/api/workflows',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:(w.name||'')+' (복사본)'})}).then(r=>r.json());
    await fetch('/api/workflows/'+nw.id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({nodes:detail.nodes,edges:detail.edges})});
    toast('복제했습니다');load();
  }catch(e){toast('복제 실패','fail');}
}
function askDelete(id){delTarget=id;const w=WORKFLOWS.find(x=>x.id===id);$('delName').textContent=w?w.name:'';$('delOverlay').classList.add('show');}
function closeDel(){$('delOverlay').classList.remove('show');delTarget=null;}
async function doDelete(){const w=WORKFLOWS.find(x=>x.id===delTarget);try{await fetch('/api/workflows/'+delTarget,{method:'DELETE'});closeDel();toast('"'+(w?w.name:'')+'" 삭제됨','fail');load();}catch(e){toast('삭제 실패','fail');}}
function pickFile(){$('fileInput').click();}
async function uploadFile(file){if(!file)return;const fd=new FormData();fd.append('file',file);try{const r=await fetch('/api/specs/upload',{method:'POST',body:fd}).then(res=>{if(!res.ok)throw 0;return res.json();});toast('스펙 등록됨 — 오퍼레이션 '+r.operation_count+'개');}catch(e){toast('스펙 업로드 실패','fail');}}
async function fromUrl(){const u=$('urlInput').value.trim();if(!u){toast('URL을 입력하세요','fail');return;}try{const r=await fetch('/api/specs/from-url',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url:u})}).then(res=>{if(!res.ok)throw 0;return res.json();});toast('스펙 가져옴 — 오퍼레이션 '+r.operation_count+'개');}catch(e){toast('가져오기 실패','fail');}}
$('fileInput').addEventListener('change',e=>{if(e.target.files[0])uploadFile(e.target.files[0]);e.target.value='';});
const dz=$('dropZone');
['dragover','dragenter'].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();dz.classList.add('drag');}));
['dragleave','drop'].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();dz.classList.remove('drag');}));
dz.addEventListener('drop',e=>{if(e.dataTransfer.files[0])uploadFile(e.dataTransfer.files[0]);});
$('themeBtn').addEventListener('click',()=>{const html=document.documentElement,dark=html.getAttribute('data-theme')==='dark';html.setAttribute('data-theme',dark?'light':'dark');$('themeIcon').textContent=dark?'🌗':'🌙';$('themeLabel').textContent=dark?'라이트':'다크';try{localStorage.setItem('mcp-theme',dark?'light':'dark');}catch(e){}});
(function(){if(document.documentElement.getAttribute('data-theme')==='dark'){$('themeIcon').textContent='🌙';$('themeLabel').textContent='다크';}})();
['createOverlay','delOverlay'].forEach(id=>$(id).addEventListener('click',e=>{if(e.target===$(id))$(id).classList.remove('show');}));
load();
