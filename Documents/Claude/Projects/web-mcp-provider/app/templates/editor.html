<!doctype html>
<html lang="ko" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>에디터 — 워크플로우 #{{ workflow_id }}</title>
<script>(function(){try{var t=localStorage.getItem('mcp-theme');if(t)document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/vendor/drawflow.min.css">
<style>
/* MCP Provider — Design Tokens (라이트 기본 + 다크 토글)
   사용법: 이 파일을 가장 먼저 로드. 다크는 <html data-theme="dark">. */
:root{
  /* surfaces */
  --canvas:#F4F6F9; --canvas-dots:#D5DAE2;
  --surface:#FFFFFF; --surface-2:#F7F9FB; --surface-3:#EEF1F5;
  --border:#E6EAEF; --border-strong:#D5DAE2;
  /* text */
  --text-1:#1A2231; --text-2:#5C6675; --text-3:#8A94A6;
  /* brand + semantic */
  --brand:#0E9E74; --brand-hover:#0B8A65; --brand-fill:#0A7D5A; /* 버튼 채움(AA) */
  --brand-weak:#E3F7EE; --brand-text:#0E8A5F;
  --success:#16A34A; --success-weak:#E3F7EE;
  --danger:#E5484D;  --danger-weak:#FDE8E8;
  --warn:#B7791F;    --warn-weak:#FFF3DD;
  --skip:#98A2B3;    --skip-weak:#EEF1F5;
  --focus:rgba(14,158,116,.40);
  /* method badges */
  --m-get:#1D6FE0;    --m-get-bg:#E5F0FF;
  --m-post:#0E8A5F;   --m-post-bg:#E3F7EE;
  --m-put:#B7791F;    --m-put-bg:#FFF3DD;
  --m-patch:#6D45D6;  --m-patch-bg:#F0EBFF;
  --m-delete:#D03939; --m-delete-bg:#FDE8E8;
  /* control-flow (logic) nodes */
  --logic-branch:#7C5CFF; --logic-branch-bg:#F0EBFF; --logic-branch-text:#6D45D6;
  --logic-loop:#E8883B;   --logic-loop-bg:#FDF0E3;   --logic-loop-text:#B7791F;
  --logic-merge:#3B82F6;  --logic-merge-bg:#E8F1FE;  --logic-merge-text:#1D6FE0;
  /* type + shape */
  --font-ui:'Plus Jakarta Sans',system-ui,sans-serif;
  --font-mono:'JetBrains Mono',ui-monospace,monospace;
  --r-sm:6px; --r-md:8px; --r-lg:12px; --r-xl:16px; --r-pill:999px;
  --sh-1:0 1px 2px rgba(16,24,40,.06);
  --sh-2:0 2px 8px rgba(16,24,40,.08);
  --sh-3:0 8px 24px -6px rgba(16,24,40,.16);
}
[data-theme="dark"]{
  --canvas:#0C0F16; --canvas-dots:#1E2533;
  --surface:#151A23; --surface-2:#1A2029; --surface-3:#222A36;
  --border:#262E3B; --border-strong:#313B4A;
  --text-1:#EAEDF3; --text-2:#8A94A6; --text-3:#5B6577;
  --brand:#2DD4A7; --brand-hover:#34E0B3; --brand-fill:#2DD4A7;
  --brand-weak:rgba(45,212,167,.14); --brand-text:#2DD4A7;
  --success:#34D399; --success-weak:rgba(52,211,153,.14);
  --danger:#FB6F84;  --danger-weak:rgba(251,111,132,.14);
  --warn:#FBBF24;    --warn-weak:rgba(251,191,36,.14);
  --skip:#5B6577;    --skip-weak:#222A36;
  --focus:rgba(45,212,167,.45);
  --m-get:#4DA3FF;    --m-get-bg:rgba(77,163,255,.14);
  --m-post:#34D399;   --m-post-bg:rgba(52,211,153,.14);
  --m-put:#FBBF24;    --m-put-bg:rgba(251,191,36,.16);
  --m-patch:#B69CFF;  --m-patch-bg:rgba(182,156,255,.16);
  --m-delete:#FB6F84; --m-delete-bg:rgba(251,111,132,.16);
  --sh-2:0 4px 14px rgba(0,0,0,.45);
  --sh-3:0 8px 28px rgba(0,0,0,.55);
}
/* MCP Provider 에디터 스타일 — 디자인팀 예제(워크플로우 빌더 예제.html) 기준.
   토큰은 tokens.css(:root/[data-theme]) 사용. 이 파일은 컴포넌트 스타일만 포함. */
*{box-sizing:border-box;}
html,body{margin:0;height:100%;}
body{font-family:var(--font-ui);background:var(--canvas);color:var(--text-1);overflow:hidden;}
button{font-family:var(--font-ui);cursor:pointer;}
.app{display:flex;flex-direction:column;height:100vh;}

/* ============================ TOOLBARS ============================ */
.tb1{height:52px;display:flex;align-items:center;gap:12px;padding:0 16px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;}
.tb2{height:46px;display:flex;align-items:center;gap:14px;padding:0 16px;border-bottom:1px solid var(--border);background:var(--surface-2);flex-shrink:0;}
.icon-btn{width:30px;height:30px;border-radius:var(--r-md);border:1px solid var(--border);background:var(--surface);color:var(--text-2);font-size:15px;display:flex;align-items:center;justify-content:center;}
.icon-btn:hover{background:var(--surface-3);}
.wf-title{font-size:15px;font-weight:700;color:var(--text-1);}
.save-chip{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--success);background:var(--success-weak);border-radius:var(--r-pill);padding:4px 10px;font-weight:600;}
.save-chip .dot{width:6px;height:6px;border-radius:50%;background:var(--success);}
.btn{height:32px;border-radius:var(--r-md);padding:0 14px;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px;border:1px solid transparent;}
.btn-secondary{background:var(--surface);border-color:var(--border-strong);color:var(--text-1);}
.btn-secondary:hover{background:var(--surface-3);}
.btn-primary{background:var(--brand-fill);color:#fff;box-shadow:var(--sh-1);}
.btn-primary:hover{filter:brightness(1.08);}
.btn-ghost{background:var(--surface-3);color:var(--text-2);}
.theme-btn{height:30px;display:flex;align-items:center;gap:6px;border-radius:var(--r-md);border:1px solid var(--border);background:var(--surface);padding:0 10px;font-size:11.5px;font-weight:600;color:var(--text-2);}
.dash-btn{height:28px;border-radius:var(--r-sm);padding:0 11px;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:5px;background:var(--surface);}
.dash-btn.start{color:var(--brand-text);border:1px dashed #B7E0CD;}
.dash-btn.end{color:var(--text-2);border:1px dashed var(--border-strong);}
.tb-sep{width:1px;height:22px;background:var(--border);}
.tb-field{display:flex;align-items:center;gap:7px;}
.tb-field label{font-size:11.5px;color:var(--text-3);}
.tb-field input{font-family:var(--font-mono);font-size:11.5px;color:var(--text-1);background:var(--surface);border:1px solid var(--border-strong);border-radius:var(--r-sm);padding:5px 9px;outline:none;}
.tb-field input:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--focus);}
.toggle{width:38px;height:22px;border-radius:var(--r-pill);background:var(--border-strong);position:relative;cursor:pointer;transition:background .15s;}
.toggle.on{background:var(--brand);}
.toggle .knob{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.2);transition:left .15s;}
.toggle.on .knob{left:18px;}

/* ============================ BODY 3-PANE ============================ */
.body{display:flex;flex:1;min-height:0;}
.panel-left{width:236px;flex-shrink:0;border-right:1px solid var(--border);background:var(--surface-2);display:flex;flex-direction:column;}
.panel-right{width:300px;flex-shrink:0;border-left:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;}
.center{flex:1;position:relative;min-width:0;}

/* tabs */
.tabs{display:flex;gap:4px;padding:11px 12px 0;}
.tab{flex:1;text-align:center;font-size:12.5px;font-weight:600;color:var(--text-3);padding:7px 0;border-bottom:2px solid transparent;cursor:pointer;}
.tab.active{color:var(--text-1);border-bottom-color:var(--brand);font-weight:700;}
.panel-head{padding:13px 14px 10px;}
.panel-head h3{margin:0 0 9px;font-size:12.5px;font-weight:700;color:var(--text-1);}
.search{display:flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:7px 10px;}
.search input{border:none;outline:none;background:none;font-size:12px;color:var(--text-1);width:100%;font-family:var(--font-ui);}
.search input::placeholder{color:var(--text-3);}
.list{flex:1;overflow-y:auto;padding:0 10px 10px;display:flex;flex-direction:column;gap:7px;}

/* operation/logic palette item (draggable) */
.op{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:9px 10px;cursor:grab;display:flex;gap:8px;align-items:flex-start;}
.op:hover{box-shadow:0 0 0 2px rgba(14,158,116,.12);}
.op:active{cursor:grabbing;}
.op .grip{color:var(--border-strong);font-size:13px;line-height:1;margin-top:1px;}
.op .meta{min-width:0;flex:1;}
.op .row1{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.op .summary{font-size:11.5px;color:var(--text-1);line-height:1.35;}
.op .logic-ico{width:22px;height:22px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.op .logic-meta{display:flex;flex-direction:column;}
.op .logic-name{font-size:12px;font-weight:600;color:var(--text-1);}
.op .logic-sub{font-size:10px;color:var(--text-3);}

.badge{font-family:var(--font-mono);font-size:9px;font-weight:600;padding:1.5px 6px;border-radius:5px;flex-shrink:0;}
.badge.get{color:var(--m-get);background:var(--m-get-bg);}
.badge.post{color:var(--m-post);background:var(--m-post-bg);}
.badge.put{color:var(--m-put);background:var(--m-put-bg);}
.badge.patch{color:var(--m-patch);background:var(--m-patch-bg);}
.badge.delete{color:var(--m-delete);background:var(--m-delete-bg);}
.op .path{font-family:var(--font-mono);font-size:10px;color:var(--text-3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* ============================ CANVAS ============================ */
#drawflow{position:absolute;inset:0;background:var(--canvas);
  background-image:radial-gradient(var(--canvas-dots) 1.2px,transparent 1.2px);
  background-size:20px 20px;}
/* strip Drawflow default node chrome — we style .wf-node inside */
.drawflow .drawflow-node{background:transparent;border:none;padding:0;box-shadow:none;border-radius:var(--r-lg);width:auto;min-width:0;}
.drawflow .drawflow-node.selected{box-shadow:none;}
.drawflow .drawflow-node .drawflow_content_node{width:auto;}
/* ports */
.drawflow .drawflow-node .input,.drawflow .drawflow-node .output{
  background:var(--surface);border:2px solid var(--border-strong);height:11px;width:11px;}
.drawflow .connection .main-path{stroke:var(--border-strong);stroke-width:2.5px;}
.drawflow .connection .main-path:hover{stroke:var(--brand);}

/* node card */
.wf-node{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--sh-2);overflow:hidden;min-width:184px;font-family:var(--font-ui);}
.wf-node .stripe{height:4px;background:var(--border);}
.wf-node .nbody{padding:11px 13px;}
.wf-node .nhead{display:flex;align-items:center;gap:7px;margin-bottom:8px;}
.wf-node .path{font-family:var(--font-mono);font-size:10.5px;color:var(--text-3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
.wf-node .title{font-size:13px;font-weight:600;color:var(--text-1);}
.wf-node .nstatus{margin-left:auto;display:flex;align-items:center;gap:3px;font-size:10px;font-weight:700;}
.wf-node .nstatus .scircle{width:14px;height:14px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-size:8px;}
.wf-node .spinner{width:13px;height:13px;border:2px solid var(--m-get);border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;margin-left:auto;}
@keyframes spin{to{transform:rotate(360deg);}}

/* SELECTED = brand border + ring (NOT red, NOT fill) */
.drawflow-node.selected .wf-node{border:1.5px solid var(--brand);box-shadow:0 0 0 3px var(--focus),var(--sh-2);}
.drawflow-node.selected .wf-node .stripe{background:var(--brand);}

/* status — applied to stripe + border ONLY */
.wf-node[data-status="success"]{border-color:#BBE6CE;}
.wf-node[data-status="success"] .stripe{background:var(--success);}
.wf-node[data-status="success"] .nstatus{color:var(--success);} .wf-node[data-status="success"] .scircle{background:var(--success);}
.wf-node[data-status="error"]{border-color:#F3C9C9;}
.wf-node[data-status="error"] .stripe{background:var(--danger);}
.wf-node[data-status="error"] .nstatus{color:var(--danger);} .wf-node[data-status="error"] .scircle{background:var(--danger);}
.wf-node[data-status="skipped"]{border-style:dashed;opacity:.75;}
.wf-node[data-status="skipped"] .stripe{background:var(--border-strong);}
.wf-node[data-status="running"] .stripe{background:linear-gradient(90deg,var(--m-get),#5BA0FF,var(--m-get));}

/* terminal nodes */
.wf-node.terminal{display:flex;align-items:center;gap:9px;padding:12px 14px;min-width:0;}
.wf-node.terminal .tico{width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.wf-node.start .tico{background:var(--brand);}
.wf-node.end .tico{background:var(--text-2);}
.wf-node.terminal .tlabel{font-size:13px;font-weight:700;color:var(--text-1);}

/* logic nodes */
.wf-node .lhead{display:flex;align-items:center;gap:8px;}
.wf-node .lico{width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.wf-node .lname{font-size:13px;font-weight:700;color:var(--text-1);}
.wf-node .lchip{font-size:10px;font-weight:600;border-radius:5px;padding:2px 7px;margin-left:auto;}
.wf-node .lexpr{font-family:var(--font-mono);font-size:11px;color:var(--text-2);background:var(--surface-2);border:1px solid var(--surface-3);border-radius:var(--r-sm);padding:6px 8px;margin-top:9px;}
.wf-node .ports{border-top:1px solid var(--surface-3);padding:8px 13px;display:flex;flex-direction:column;gap:7px;}
.wf-node .pline{display:flex;align-items:center;gap:7px;}
.wf-node .pdot{width:8px;height:8px;border-radius:50%;}
.wf-node .plabel{font-size:11px;color:var(--text-1);}
.branch .stripe{background:var(--logic-branch);} .branch .lico{background:var(--logic-branch);}
.loop .stripe{background:var(--logic-loop);} .loop .lico{background:var(--logic-loop);}
.merge .stripe{background:var(--logic-merge);} .merge .lico{background:var(--logic-merge);}

/* zoom controls */
.zoom{position:absolute;left:12px;bottom:12px;display:flex;flex-direction:column;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden;box-shadow:var(--sh-2);z-index:5;}
.zoom button{width:30px;height:30px;border:none;background:var(--surface);color:var(--text-2);font-size:15px;}
.zoom button:first-child{border-bottom:1px solid var(--border);}
.zoom button:hover{background:var(--surface-3);}

/* align toolbar */
.align-bar{position:absolute;left:50%;top:12px;transform:translateX(-50%);display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:6px;box-shadow:var(--sh-3);z-index:5;}
.align-auto{display:flex;align-items:center;gap:7px;height:32px;border:none;background:var(--brand-weak);color:var(--brand-text);border-radius:var(--r-md);padding:0 12px;font-size:12.5px;font-weight:700;}
.align-sep{width:1px;height:22px;background:var(--surface-3);margin:0 2px;}
.align-btn{width:32px;height:32px;border:none;background:var(--surface);border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;}
.align-btn:hover{background:var(--surface-3);}
.align-btn:disabled{opacity:.4;cursor:not-allowed;}

/* hint */
.hint{position:absolute;right:12px;top:12px;font-size:11px;color:var(--text-3);background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:4px 9px;z-index:5;}

/* right panel content */
.pcontent{flex:1;overflow-y:auto;padding:14px;}
.prop-empty{color:var(--text-3);font-size:12.5px;text-align:center;padding:40px 12px;line-height:1.6;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;font-weight:600;color:var(--text-2);margin-bottom:5px;}
.field input{width:100%;font-family:var(--font-mono);font-size:11.5px;color:var(--text-1);background:var(--surface);border:1px solid var(--border-strong);border-radius:var(--r-sm);padding:7px 9px;outline:none;}
.field input:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--focus);}
.code{background:#0C0F16;border-radius:var(--r-md);padding:10px 11px;font-family:var(--font-mono);font-size:10.5px;line-height:1.6;color:#C7CDD8;white-space:pre;overflow-x:auto;}
.code .str{color:#34D399;} .code .var{color:#FBBF24;}
.sec-label{font-size:11px;font-weight:700;color:var(--text-1);margin-bottom:7px;display:flex;align-items:center;gap:6px;}
.map{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r-md);padding:11px 12px;}
.map-row{display:flex;align-items:center;gap:8px;font-family:var(--font-mono);font-size:10.5px;}
.map-row .from{flex:1;background:var(--surface);border:1px solid var(--border-strong);border-radius:var(--r-sm);padding:5px 8px;color:var(--text-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.map-row .arrow{color:var(--brand);font-size:13px;}
.map-row .to{flex:1;background:var(--surface);border:1px solid var(--brand);border-radius:var(--r-sm);padding:5px 8px;color:var(--text-1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* log */
.log-run{padding:13px 16px;border-bottom:1px solid var(--border);background:var(--surface-2);display:flex;align-items:center;gap:9px;}
.run-pill{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border-strong);border-radius:var(--r-sm);padding:5px 10px;font-size:12px;font-weight:600;color:var(--text-1);}
.run-time{font-size:11.5px;color:var(--text-3);}
.run-status{margin-left:auto;display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;border-radius:var(--r-pill);padding:4px 10px;}
.run-status.ok{color:var(--brand-text);background:var(--success-weak);}
.run-status.fail{color:var(--danger);background:var(--danger-weak);}
.logcard{border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden;margin-bottom:9px;}
.logcard .lc-head{padding:10px 12px;display:flex;align-items:center;gap:9px;border-left:3px solid var(--border);}
.logcard.ok .lc-head{border-left-color:var(--success);}
.logcard.fail .lc-head{border-left-color:var(--danger);}
.logcard.skip .lc-head{border-left-color:var(--border-strong);opacity:.7;}
.lc-circle{width:16px;height:16px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;}
.lc-name{font-size:12px;font-weight:600;color:var(--text-1);}
.lc-code{font-family:var(--font-mono);font-size:10.5px;font-weight:600;}
.lc-time{font-size:10.5px;color:var(--text-3);}

/* toast */
.toast-wrap{position:fixed;right:18px;bottom:18px;display:flex;flex-direction:column;gap:9px;z-index:100;}
.toast{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--success);border-radius:var(--r-lg);padding:10px 13px;box-shadow:var(--sh-2);font-size:12.5px;color:var(--text-1);font-weight:500;animation:slidein .2s ease;}
.toast.fail{border-left-color:var(--danger);}
.toast .ticon{width:18px;height:18px;border-radius:50%;color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--success);}
.toast.fail .ticon{background:var(--danger);}
@keyframes slidein{from{transform:translateX(20px);opacity:0;}}

/* run dialog */
.overlay{position:fixed;inset:0;background:rgba(16,24,40,.45);display:none;align-items:center;justify-content:center;z-index:50;}
.overlay.show{display:flex;}
.dialog{width:480px;max-height:88vh;overflow-y:auto;background:var(--surface);border-radius:var(--r-xl);box-shadow:var(--sh-3);}
.dlg-head{padding:18px 20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:12px;}
.dlg-ico{width:34px;height:34px;border-radius:9px;background:var(--brand-weak);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--brand-text);font-size:13px;}
.dlg-head h2{margin:0;font-size:16px;font-weight:700;color:var(--text-1);}
.dlg-head p{margin:2px 0 0;font-size:12px;color:var(--text-3);}
.dlg-body{padding:18px 20px;}
.seg{display:flex;width:100%;background:var(--surface-3);border-radius:9px;padding:3px;gap:2px;margin-bottom:18px;}
.seg button{flex:1;border:none;background:none;font-size:12.5px;font-weight:600;color:var(--text-3);padding:7px 0;border-radius:7px;}
.seg button.active{background:var(--surface);color:var(--text-1);box-shadow:var(--sh-1);}
.dlg-sec-label{font-size:11px;font-weight:700;color:var(--text-1);margin-bottom:9px;}
.radio-row{display:flex;gap:8px;margin-bottom:10px;}
.radio{display:flex;align-items:center;gap:6px;font-size:12px;border-radius:7px;padding:6px 12px;border:1px solid var(--border-strong);background:var(--surface);color:var(--text-2);}
.radio.on{background:var(--brand-weak);border-color:#B7E0CD;color:var(--text-1);font-weight:600;}
.radio .rdot{width:13px;height:13px;border-radius:50%;border:1.5px solid var(--border-strong);box-sizing:border-box;}
.radio.on .rdot{border:4px solid var(--brand);}
.pgroup{margin-bottom:14px;}
.pgroup .pg-head{display:flex;align-items:center;gap:7px;margin-bottom:8px;}
.pg-head .pg-name{font-size:11.5px;font-weight:600;color:var(--text-1);}
.prow{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.prow label{font-family:var(--font-mono);font-size:11px;color:var(--text-2);width:64px;flex-shrink:0;}
.prow label .req{color:var(--danger);}
.prow input{flex:1;font-size:11.5px;color:var(--text-1);background:var(--surface);border:1px solid var(--border-strong);border-radius:var(--r-sm);padding:6px 10px;outline:none;font-family:var(--font-mono);}
.prow input:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--focus);}
.automap{flex:1;display:flex;align-items:center;gap:7px;background:var(--surface-2);border:1px dashed var(--border-strong);border-radius:var(--r-sm);padding:6px 10px;font-size:11px;color:var(--text-3);}
.automap .chip{font-family:var(--font-mono);font-size:10px;color:var(--brand-text);background:var(--brand-weak);border-radius:4px;padding:1px 6px;margin-left:auto;}
.dlg-foot{padding:16px 20px 20px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;}

/* 엣지 화살표 마커(context-stroke: 선 색 자동 추종) + 실행 상태색 */
.drawflow .connection .main-path{marker-end:url(#df-arrow);}
.drawflow .connection.is-success .main-path{stroke:var(--success);}
.drawflow .connection.is-skip .main-path{stroke:var(--skip);stroke-dasharray:6 4;}
#wf-markers{position:absolute;width:0;height:0;}
/* 속성 패널 파라미터 편집기 */
.field textarea{width:100%;font-family:var(--font-mono);font-size:11px;color:var(--text-1);background:var(--surface);border:1px solid var(--border-strong);border-radius:var(--r-sm);padding:7px 9px;outline:none;resize:vertical;line-height:1.5;}
.field textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--focus);}

/* 실행 로그 상세(펼치기) */
.logcard .lc-head{cursor:pointer;}
.logcard .lc-toggle{color:var(--text-3);font-size:11px;margin-left:8px;}
.lc-detail{display:none;padding:2px 12px 12px;border-top:1px solid var(--border);}
.lc-detail.open{display:block;}
.lc-detail .lc-label{font-size:10px;font-weight:700;color:var(--text-2);letter-spacing:.04em;margin:10px 0 5px;}
.lc-detail .code{background:#0C0F16;border-radius:var(--r-md);padding:9px 11px;font-family:var(--font-mono);font-size:10.5px;line-height:1.55;color:#C7CDD8;white-space:pre-wrap;word-break:break-all;max-height:240px;overflow:auto;}
.lc-detail .err{color:var(--danger);font-family:var(--font-mono);font-size:11px;white-space:pre-wrap;background:var(--danger-weak);border-radius:var(--r-sm);padding:8px 10px;}

/* 다중 선택 하이라이트 + 선택 컨텍스트 바 */
.drawflow .drawflow-node.multi-sel .wf-node{outline:2px solid var(--brand);outline-offset:2px;}
.sel-bar{position:absolute;left:50%;bottom:14px;transform:translateX(-50%);display:none;align-items:center;gap:9px;background:var(--text-1);color:#fff;border-radius:var(--r-pill);padding:7px 8px 7px 14px;font-size:12px;font-weight:600;box-shadow:var(--sh-3);z-index:6;}
.sel-bar .sb-x{border:none;background:rgba(255,255,255,.16);color:#fff;border-radius:var(--r-pill);padding:3px 10px;font-size:11px;font-weight:600;}
.sel-bar .sb-x:hover{background:rgba(255,255,255,.28);}
</style></head><body>

  <div class="tb1">

        <div class="align-sep"></div>
        <button class="align-btn" id="alTop" disabled title="위 정렬" onclick="alignSel('top')"><svg width="16" height="16" viewBox="0 0 16 16"><line x1="2.5" y1="3" x2="13.5" y2="3" stroke="var(--brand)" stroke-width="1.6" stroke-linecap="round"></line><rect x="4" y="5" width="3" height="8" rx="1" fill="var(--text-3)"></rect><rect x="9" y="5" width="3" height="5" rx="1" fill="var(--text-3)"></rect></svg></button>

        <button class="align-btn" id="alRight" disabled title="오른쪽 정렬" onclick="alignSel('right')"><svg width="16" height="16" viewBox="0 0 16 16"><line x1="13" y1="2.5" x2="13" y2="13.5" stroke="var(--brand)" stroke-width="1.6" stroke-linecap="round"></line><rect x="3" y="4" width="8" height="3" rx="1" fill="var(--text-3)"></rect><rect x="6" y="9" width="5" height="3" rx="1" fill="var(--text-3)"></rect></svg></button>

      </div>

      <div class="pcontent" id="rtProp"><div class="prop-empty" id="propEmpty">노드를 선택하면<br>여기에서 값을 편집할 수 있어요.</div><div id="propBody" style="display:none;"></div></div>

</div>
<div class="toast-wrap" id="toastWrap"></div>
<div class="overlay" id="runOverlay"><div class="dialog">

  <div class="dlg-head"><div class="dlg-ico">✎</div><div style="flex:1;"><h2>워크플로우 정보</h2><p>이름과 설명(MCP 도구 설명)을 수정합니다</p></div><button class="icon-btn" onclick="closeMeta()">✕</button></div>

</div></div>
<script src="/static/vendor/drawflow.min.js"></script>
<script>
{% raw %}
/* MCP Provider — 에디터 캔버스 (디자인팀 예제 기준 + 백엔드 연동)
   전역 함수(onclick): openRun, closeRun, runWorkflow, addTerminal, switchPal, switchRT, autoLayout, alignSel, distribute, pickAuth */
"use strict";

// [진단] 모든 JS 오류를 화면 상단 빨간 배너로 표시
window.addEventListener("error", function (ev) {
  var b = document.createElement("div");
  b.style.cssText = "position:fixed;top:0;left:0;right:0;z-index:99999;background:#E5484D;color:#fff;font:600 12px/1.4 sans-serif;padding:8px 14px;text-align:center;white-space:pre-wrap";
  b.textContent = "JS 오류: " + (ev.message || "") + "  @ " + (ev.filename || "") + ":" + (ev.lineno || "");
  document.body.appendChild(b);
});


const APP = document.querySelector(".app") || document.querySelector(".editor") || document.body;
const WF_ID = parseInt((APP.getAttribute && APP.getAttribute("data-workflow-id")) || "0", 10);
const container = document.getElementById("drawflow");

let editor = null;
let opsById = {};
const edgeMap = {};
let dirty = false;
let runNo = 1;
let authType = "none";
let runMode = "form";
let addCount = 0;
let selectedIds = new Set();
let wfDescription = null;

const esc = (s) => String(s == null ? "" : s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
const mlow = (m) => String(m || "get").toLowerCase();

function fatalBanner(msg) {
  document.body.insertAdjacentHTML("afterbegin",
    '<div style="position:fixed;top:0;left:0;right:0;z-index:9999;background:#E5484D;color:#fff;font:600 13px/1.5 sans-serif;padding:10px 16px;text-align:center">' + esc(msg) + "</div>");
}

function toast(msg, kind) {
  const w = document.getElementById("toastWrap");
  if (!w) return;
  const t = document.createElement("div");
  t.className = "toast" + (kind === "fail" ? " fail" : "");
  t.innerHTML = '<span class="ticon">' + (kind === "fail" ? "!" : "✓") + "</span>" + esc(msg);
  w.appendChild(t);
  setTimeout(() => { t.style.opacity = "0"; t.style.transition = "opacity .3s"; setTimeout(() => t.remove(), 300); }, 2600);
}

function setDirty(d) {
  dirty = d;
  const chip = document.getElementById("saveChip");
  if (!chip) return;
  chip.innerHTML = '<span class="dot"></span>' + (d ? "저장 안 됨" : "저장됨");
  chip.style.opacity = d ? ".7" : "1";
}

function apiNodeHTML(op) {
  return '<div class="wf-node" data-status="">' +
    '<div class="stripe"></div><div class="nbody">' +
    '<div class="nhead"><span class="badge ' + mlow(op.method) + '">' + esc((op.method || "GET").toUpperCase()) + "</span>" +
    '<span class="path">' + esc(op.path) + "</span></div>" +
    '<div class="title">' + esc(op.summary || op.path) + "</div></div></div>";
}
function terminalHTML(kind) {
  const ico = kind === "start"
    ? '<div style="width:0;height:0;border-top:5px solid transparent;border-bottom:5px solid transparent;border-left:8px solid #fff;margin-left:2px;"></div>'
    : '<div style="width:8px;height:8px;background:#fff;border-radius:2px;"></div>';
  return '<div class="wf-node terminal ' + kind + '"><span class="tico">' + ico + '</span><span class="tlabel">' + (kind === "start" ? "시작" : "종료") + "</span></div>";
}

function seedParams(op) {
  const p = { path: {}, query: {}, header: {}, body: null };
  (op.params_schema || []).forEach((s) => {
    if (["path", "query", "header"].includes(s.in)) {
      const sc = s.schema || {};
      let v = sc.default;
      if (v === undefined && Array.isArray(sc.examples) && sc.examples.length) v = sc.examples[0];
      p[s.in][s.name] = v !== undefined ? v : "";
    }
  });
  return p;
}

function slimOp(op) { return { id: op.id, method: op.method, path: op.path, summary: op.summary || op.path }; }
function addApiNode(op, x, y, params, baseUrl) {
  // Drawflow 가 data 객체의 키로 [df-...] 선택자를 만들므로, $ref 등 특수문자 포함 스키마는 절대 넣지 않는다(슬림 op).
  const data = { op: slimOp(op), params: params || seedParams(op), base_url: baseUrl || null };
  const id = editor.addNode("api", 1, 1, x, y, "api", data, apiNodeHTML(op));
  setDirty(true);
  return id;
}
function addTerminal(kind) {
  const y = 140 + Math.random() * 120, x = kind === "start" ? 60 : 760;
  const id = editor.addNode(kind, kind === "start" ? 0 : 1, kind === "start" ? 1 : 0, x, y, kind, {}, terminalHTML(kind));
  setDirty(true);
  toast((kind === "start" ? "시작" : "종료") + " 노드를 추가했습니다");
  return id;
}

async function loadOperations() {
  const ops = document.getElementById("paletteOps");
  if (!ops) return;
  try {
    const specs = await fetch("/api/specs").then((r) => r.json());
    if (!specs.length) { ops.innerHTML = '<div class="prop-empty">스펙을 먼저 등록하세요<br>(POST /api/specs/from-url)</div>'; return; }
    const list = await fetch("/api/specs/" + specs[0].id + "/operations").then((r) => r.json());
    opsById = {};
    ops.innerHTML = "";
    list.forEach((op) => {
      opsById[op.id] = op;
      const el = document.createElement("div");
      el.className = "op"; el.draggable = true;
      el.innerHTML = '<span class="grip">⠿</span><div class="meta"><div class="row1">' +
        '<span class="badge ' + mlow(op.method) + '">' + esc(op.method) + '</span>' +
        '<span class="path">' + esc(op.path) + '</span></div>' +
        '<div class="summary">' + esc(op.summary || "") + "</div></div>";
      el.addEventListener("dragstart", (e) => e.dataTransfer.setData("drag", JSON.stringify({ kind: "api", op: op, opId: op.id })));
      el.addEventListener("click", () => {
        addApiNode(op, 140 + (addCount % 6) * 36, 90 + (addCount % 6) * 36);
        addCount++;
        toast("노드를 추가했습니다 — 드래그로 위치를 옮기세요");
      });
      ops.appendChild(el);
    });
    toast("오퍼레이션 " + list.length + "개 로드됨 · Drawflow:" + (typeof Drawflow));
  } catch (e) { ops.innerHTML = '<div class="prop-empty">오퍼레이션 로드 실패: ' + (e && e.message) + '</div>'; }
}
function buildLogicPalette() {
  const lg = document.getElementById("paletteLogic");
  if (!lg) return;
  const LOGIC = [["분기 (IF)", "branch"], ["반복 (Loop)", "loop"], ["병합 (Merge)", "merge"]];
  const colors = { branch: "var(--logic-branch)", loop: "var(--logic-loop)", merge: "var(--logic-merge)" };
  lg.innerHTML = LOGIC.map(([name, g]) =>
    '<div class="op"><span class="logic-ico" style="background:' + colors[g] + '"></span>' +
    '<div class="logic-meta"><span class="logic-name">' + name + '</span><span class="logic-sub">7단계 로드맵</span></div></div>').join("");
}
function switchPal(which) {
  document.querySelectorAll(".tab[data-pal]").forEach((t) => t.classList.toggle("active", t.dataset.pal === which));
  document.getElementById("paletteOps").style.display = which === "ops" ? "flex" : "none";
  document.getElementById("paletteLogic").style.display = which === "logic" ? "flex" : "none";
}

function wireDrop() {
  container.addEventListener("dragover", (e) => e.preventDefault());
  container.addEventListener("drop", (e) => {
    e.preventDefault();
    const raw = e.dataTransfer.getData("drag"); if (!raw) return;
    const d = JSON.parse(raw);
    const z = editor.zoom;
    const rect = container.getBoundingClientRect();
    const x = (e.clientX - rect.left - editor.canvas_x) / z;
    const y = (e.clientY - rect.top - editor.canvas_y) / z;
    const op = d.op || opsById[d.opId];
    if (d.kind === "api" && op) addApiNode(op, x, y);
  });
}

function exportGraph() {
  const data = editor.drawflow.drawflow.Home.data;
  const nodes = [], edges = [];
  Object.keys(data).forEach((id) => {
    const n = data[id], cls = n.class, dd = n.data || {};
    const type = cls === "api" ? "api_call" : (cls === "start" || cls === "end") ? cls : "transform";
    nodes.push({
      id: String(id), type: type,
      label: dd.op ? (dd.op.summary || dd.op.path) : null,
      operation_id: dd.op ? dd.op.id : null,
      base_url: dd.base_url || null,
      params: dd.params || {},
      position: { x: n.pos_x, y: n.pos_y },
    });
    Object.keys(n.outputs || {}).forEach((ok) => {
      (n.outputs[ok].connections || []).forEach((c) => {
        const src = String(id), tgt = String(c.node);
        edges.push({ id: src + "-" + tgt, source: src, target: tgt, data_mapping: edgeMap[src + "->" + tgt] || [] });
      });
    });
  });
  return { nodes, edges };
}

async function saveGraph() {
  const g = exportGraph();
  const body = { nodes: g.nodes, edges: g.edges, name: document.getElementById("wfTitle").textContent.trim() || undefined, description: wfDescription };
  const r = await fetch("/api/workflows/" + WF_ID, { method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
  if (r.ok) { setDirty(false); toast("워크플로우가 저장되었습니다"); }

}

async function loadWorkflow() {
  const wf = await fetch("/api/workflows/" + WF_ID).then((r) => (r.ok ? r.json() : null));
  if (!wf) return;
  document.getElementById("wfTitle").textContent = wf.name || ("워크플로우 #" + WF_ID);
  wfDescription = wf.description || null;
  document.getElementById("wfTitle").title = wfDescription || "";
  document.getElementById("toolName").value = wf.mcp_tool_name || "";
  document.getElementById("mcpGroup").value = wf.mcp_group || "";
  if (wf.mcp_exposed) document.getElementById("mcpToggle").classList.add("on");

  const idMap = {};
  (wf.nodes || []).forEach((n) => {
    const x = (n.position && n.position.x) || 60, y = (n.position && n.position.y) || 80;
    let live;
    if (n.type === "start" || n.type === "end") {
      live = editor.addNode(n.type, n.type === "start" ? 0 : 1, n.type === "start" ? 1 : 0, x, y, n.type, {}, terminalHTML(n.type));
    } else if (n.type === "api_call") {
      const op = opsById[n.operation_id] || { id: n.operation_id, method: "GET", path: n.label || "", summary: n.label };
      live = editor.addNode("api", 1, 1, x, y, "api", { op: slimOp(op), params: n.params || seedParams(op), base_url: n.base_url || null }, apiNodeHTML(op));
    } else { return; }
    idMap[n.id] = live;
  });
  (wf.edges || []).forEach((e) => {
    const s = idMap[e.source], t = idMap[e.target];
    if (s == null || t == null) return;
    try { editor.addConnection(s, t, "output_1", "input_1"); } catch (_) {}
    if (e.data_mapping && e.data_mapping.length) edgeMap[s + "->" + t] = e.data_mapping;
  });
  refreshAlignState();
  setDirty(false);
}

async function runWorkflow() {
  const data = editor.drawflow.drawflow.Home.data;
  const apiIds = Object.keys(data).filter((id) => data[id].class === "api");
  if (runMode === "form") {
    document.querySelectorAll("#runParams input[data-node]").forEach((inp) => {
      const nd = data[inp.dataset.node]; if (!nd) return;
      nd.data.params = nd.data.params || { path: {}, query: {}, header: {}, body: null };
      if (inp.dataset.sec === "body") nd.data.params.body = inp.value;
      else { nd.data.params[inp.dataset.sec] = nd.data.params[inp.dataset.sec] || {}; nd.data.params[inp.dataset.sec][inp.dataset.key] = inp.value; }
    });
  }
  let initial = {};
  if (runMode === "json") { try { initial = JSON.parse(document.getElementById("runJson").value || "{}"); } catch (e) { toast("initial_input JSON 오류", "fail"); return; } }
  let auth = null;
  if (authType === "bearer") auth = { type: "bearer", token: (document.getElementById("authToken") || {}).value };
  else if (authType === "apikey") auth = { type: "apikey", name: (document.getElementById("authName") || {}).value, value: (document.getElementById("authVal") || {}).value, location: "header" };

  closeRun();
  if (!apiIds.length) { toast("실행할 API 노드가 없습니다", "fail"); return; }
  if (!(await saveGraph())) return;
  apiIds.forEach((id) => setStatus(id, "running"));

  let res;
  try {
    res = await fetch("/api/workflows/" + WF_ID + "/run", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ initial_input: initial, auth }) }).then((r) => r.json());
  } catch (e) { toast("실행 요청 실패", "fail"); apiIds.forEach((id) => setStatus(id, "")); return; }

  const statusByNode = {};
  (res.logs || []).forEach((l) => {
    statusByNode[l.node_key] = l.status;
    let code = l.status_code; if (!code && l.error) { const m = String(l.error).match(/\d{3}/); if (m) code = m[0]; }
    const map = { success: "success", failed: "error", skipped: "skipped" };
    const badge = l.status === "success" ? "✓ " + (code || "200") : l.status === "failed" ? "! " + (code || "ERR") : "스킵";
    setStatus(l.node_key, map[l.status] || "", badge);
  });
  colorEdges(statusByNode);
  buildLog(res);
  switchRT("log");
  if (res.status === "success") toast("워크플로우 실행 완료");
  else { const f = (res.logs || []).find((l) => l.status === "failed"); toast("실행 실패 — " + (f ? (f.node_key + " · " + (f.error || "")) : res.status), "fail"); }
}

function setStatus(id, status, badge) {
  const el = document.querySelector("#node-" + id + " .wf-node"); if (!el) return;
  el.setAttribute("data-status", status);
  const head = el.querySelector(".nhead"); if (!head) return;
  const oldS = head.querySelector(".nstatus"), oldSp = head.querySelector(".spinner");
  if (oldS) oldS.remove(); if (oldSp) oldSp.remove();
  if (status === "running") { head.insertAdjacentHTML("beforeend", '<span class="spinner"></span>'); return; }
  if (badge && (status === "success" || status === "error")) {
    const icon = status === "success" ? "✓" : "!";
    const text = badge.replace(/^[✓!]\s*/, "");
    head.insertAdjacentHTML("beforeend", '<span class="nstatus"><span class="scircle">' + icon + "</span>" + esc(text) + "</span>");
  }
}

function colorEdges(statusByNode) {
  const data = editor.drawflow.drawflow.Home.data;
  Object.keys(data).forEach((src) => {
    Object.keys(data[src].outputs || {}).forEach((ok) => {
      (data[src].outputs[ok].connections || []).forEach((c) => {
        const tgt = String(c.node);
        const conn = container.querySelector(".connection.node_out_node-" + src + ".node_in_node-" + tgt);
        if (!conn) return;
        conn.classList.remove("is-success", "is-skip");
        if (statusByNode[tgt] === "skipped") conn.classList.add("is-skip");
        else if (statusByNode[src] === "success") conn.classList.add("is-success");
      });
    });
  });
}

function buildLog(res) {

    if (l.status === "failed") { cls = "fail"; circle = "var(--danger)"; icon = "!"; code = (l.error && (String(l.error).match(/\d{3}/) || [])[0]) || "ERR"; cc = "var(--danger)"; }

      "</div>";
    return '<div class="logcard ' + cls + '"><div class="lc-head">' +
      '<span class="lc-circle" style="background:' + circle + '">' + icon + "</span>" +
      '<span class="badge ' + method + '">' + (nd && nd.data.op ? esc(nd.data.op.method) : "") + "</span>" +
      '<span class="lc-name">' + esc(name) + "</span>" +

  }).join("");
  log.innerHTML = '<div class="log-run" style="margin:-14px -14px 12px;"><div class="run-pill">\uc2e4\ud589 #' + (res.execution_id || runNo++) + '</div><span class="run-time">\ubc29\uae08 \uc804</span>' +
    '<span class="run-status ' + (failed ? "fail" : "ok") + '"><span class="lc-circle" style="background:' + (failed ? "var(--danger)" : "var(--success)") + ';">' + (failed ? "!" : "\u2713") + "</span>" + (failed ? "\uc2e4\ud328" : "\uc131\uacf5") + "</span></div>" +
    (rows || '<div class="prop-empty">\ub85c\uadf8 \uc5c6\uc74c</div>');

  }));
}

// 선택 노드가 2개 이상이면 그 노드들만, 아니면 전체 노드 대상
function targets() { return selectedIds.size >= 2 ? [...selectedIds].filter((id) => allNodes()[id]) : Object.keys(allNodes()); }
function markSel() {

  const bar = document.getElementById("selBar");

    else bar.style.display = "none";
  }

function clearSel() { selectedIds.clear(); markSel(); }
function refreshAlignState() {
  const n = targets().length;
  ["alTop", "alBot", "alLeft", "alRight", "alDistH"].forEach((id) => { const b = document.getElementById(id); if (b) b.disabled = n < 2; });
}
function moveNode(id, x, y) {
  // [GOTCHA #3] CSS 트랜지션 금지 — rAF 로 pos_x/pos_y 직접 트윈하며 매 프레임 updateConnectionNodes
  const nd = allNodes()[id]; if (!nd) return;
  const el = document.getElementById("node-" + id); if (!el) return;
  const sx = nd.pos_x, sy = nd.pos_y, dur = 200, t0 = performance.now();
  const ease = (q) => 1 - Math.pow(1 - q, 3);
  (function step(now) {
    const q = Math.min(1, (now - t0) / dur), k = ease(q);
    nd.pos_x = sx + (x - sx) * k; nd.pos_y = sy + (y - sy) * k;
    el.style.left = nd.pos_x + "px"; el.style.top = nd.pos_y + "px";
    editor.updateConnectionNodes("node-" + id);
    if (q < 1) requestAnimationFrame(step);
    else { nd.pos_x = x; nd.pos_y = y; el.style.left = x + "px"; el.style.top = y + "px"; editor.updateConnectionNodes("node-" + id); }
  })(performance.now());
  setDirty(true);
}
function alignSel(dir) {
  const nodes = allNodes(), ids = targets();
  if (ids.length < 2) { toast("정렬하려면 노드를 2개 이상 선택(Shift+클릭)하세요", "fail"); return; }
  const xs = ids.map((i) => nodes[i].pos_x), ys = ids.map((i) => nodes[i].pos_y);
  if (dir === "top") { const m = Math.min.apply(null, ys); ids.forEach((i) => moveNode(i, nodes[i].pos_x, m)); }
  if (dir === "bottom") { const m = Math.max.apply(null, ys); ids.forEach((i) => moveNode(i, nodes[i].pos_x, m)); }
  if (dir === "left") { const m = Math.min.apply(null, xs); ids.forEach((i) => moveNode(i, m, nodes[i].pos_y)); }
  if (dir === "right") { const m = Math.max.apply(null, xs); ids.forEach((i) => moveNode(i, m, nodes[i].pos_y)); }
  toast((selectedIds.size >= 2 ? "선택한 " + ids.length + "개" : "전체") + " 노드를 정렬했습니다");
}
function distribute(axis) {
  const nodes = allNodes(), ids = targets().sort((a, b) => nodes[a].pos_x - nodes[b].pos_x);
  if (ids.length < 3) { toast("균등 분배는 노드 3개 이상 선택해야 합니다", "fail"); return; }
  const first = nodes[ids[0]].pos_x, last = nodes[ids[ids.length - 1]].pos_x, step = (last - first) / (ids.length - 1);
  ids.forEach((i, k) => moveNode(i, first + step * k, nodes[i].pos_y));
  toast("균등 분배했습니다");
}
function autoLayout() {
  const nodes = allNodes(), ids = Object.keys(nodes);
  if (!ids.length) { toast("정렬할 노드가 없습니다", "fail"); return; }
  const order = ids.sort((a, b) => { const rank = (c) => (c === "start" ? 0 : c === "end" ? 2 : 1); return rank(nodes[a].class) - rank(nodes[b].class) || (+a) - (+b); });
  order.forEach((id, k) => moveNode(id, 80 + k * 240, 200));
  toast("자동 정렬 완료");
}

if (typeof Drawflow === "undefined") {
  fatalBanner("Drawflow 라이브러리를 불러오지 못했습니다. /static/vendor/drawflow.min.js 경로를 확인하세요.");

  editor.reroute = true;
  editor.start();

  editor.on("zoom", (z) => { const h = document.getElementById("zoomHint"); if (h) h.textContent = Math.round(z * 100) + "%"; });
  editor.on("nodeSelected", (id) => showProps(id));
  editor.on("nodeUnselected", () => hideProps());
  editor.on("connectionSelected", (c) => showEdgeProps(String(c.output_id), String(c.input_id)));
  editor.on("nodeCreated", refreshAlignState);
  editor.on("nodeRemoved", (id) => { selectedIds.delete(String(id)); markSel(); hideProps(); });
  editor.on("nodeMoved", () => setDirty(true));
  editor.on("connectionCreated", () => setDirty(true));
  editor.on("connectionRemoved", () => setDirty(true));

  wireDrop();

  // 다중 선택: 클릭=단일, Shift+클릭=추가/토글, 빈 캔버스=해제
  container.addEventListener("click", (e) => {
    const nodeEl = e.target.closest(".drawflow-node");
    if (!nodeEl) { if (!e.shiftKey) { selectedIds.clear(); markSel(); } return; }
    const id = nodeEl.id.replace("node-", "");
    if (e.shiftKey) { selectedIds.has(id) ? selectedIds.delete(id) : selectedIds.add(id); }
    else { selectedIds.clear(); selectedIds.add(id); }
    markSel();
  });

  const on = (id, evt, fn) => { const el = document.getElementById(id); if (el) el.addEventListener(evt, fn); };

  on("opSearch", "input", (e) => {
    const q = e.target.value.toLowerCase();
    document.querySelectorAll("#paletteOps .op").forEach((el) => (el.style.display = el.textContent.toLowerCase().includes(q) ? "flex" : "none"));
  });
  on("modeSeg", "click", (e) => {
    const b = e.target.closest("button"); if (!b) return;
    runMode = b.dataset.mode;
    document.querySelectorAll("#modeSeg button").forEach((x) => x.classList.toggle("active", x === b));
    document.getElementById("runParams").style.display = runMode === "form" ? "" : "none";
    document.getElementById("runJsonWrap").style.display = runMode === "json" ? "" : "none";
  });
  on("btnSave", "click", saveGraph);
  on("editTitle", "click", openMeta);
  const mo = document.getElementById("metaOverlay");
  if (mo) mo.addEventListener("click", (e) => { if (e.target === mo) closeMeta(); });
  on("zoomIn", "click", () => editor.zoom_in());
  on("zoomOut", "click", () => editor.zoom_out());
  on("themeBtn", "click", () => {
    const html = document.documentElement, dark = html.getAttribute("data-theme") === "dark";
    html.setAttribute("data-theme", dark ? "light" : "dark");
    const ti = document.getElementById("themeIcon"), tl = document.getElementById("themeLabel");
    if (ti) ti.textContent = dark ? "🌗" : "🌙"; if (tl) tl.textContent = dark ? "라이트" : "다크";
    try { localStorage.setItem("mcp-theme", dark ? "light" : "dark"); } catch (e) {}
  });
  if (document.documentElement.getAttribute("data-theme") === "dark") {
    const ti = document.getElementById("themeIcon"), tl = document.getElementById("themeLabel");
    if (ti) ti.textContent = "🌙"; if (tl) tl.textContent = "다크";
  }
  const mcpToggle = document.getElementById("mcpToggle");
  if (mcpToggle) mcpToggle.addEventListener("click", () => { mcpToggle.classList.toggle("on"); pushExpose(); });
  on("toolName", "change", () => { if (mcpToggle && mcpToggle.classList.contains("on")) pushExpose(); });
  on("mcpGroup", "change", () => { if (mcpToggle && mcpToggle.classList.contains("on")) pushExpose(); });

  window.addEventListener("beforeunload", (e) => { if (dirty) { e.preventDefault(); e.returnValue = ""; } });

  (async function boot() {
    ensureMarkers();
    buildLogicPalette();
    await loadOperations();
    await loadWorkflow();
    refreshAlignState();
  })();
}
{% endraw %}
</script>
</body>
</html>
